<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tablero de Cascadas</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }

header {
    background:red; color:white; padding:15px;
    display:flex; justify-content:space-between; align-items:center;
}

h2.main-title{
    text-align:center; font-weight:bold; text-transform:uppercase;
}

button { background:orange; padding:10px; border:none; cursor:pointer; }

.kpis { display:flex; justify-content:center; gap:20px; margin:20px; }

.card {
    background:white; padding:20px; width:25%; text-align:center;
    border-radius:10px;
}

.plan{border:3px solid #4a6cff;}
.real{border:3px solid gray;}
.desv{border:3px solid red;}

.filtro {margin:20px; background:white; padding:15px; border-radius:10px;}

table {width:100%; border-collapse:collapse;}
th,td{padding:8px;text-align:center;}
th{background:#ddd;}
</style>
</head>

<body>

<header>
<h2>Tablero de Cascadas</h2>
<div id="fechaHoy"></div>
<button onclick="document.getElementById('fileInput').click()">📂 Cargar Excel</button>
<input type="file" id="fileInput" style="display:none">
</header>

<h2 class="main-title">CUMPLIMIENTO DEL PROYECTO</h2>

<div class="kpis">
<div class="card plan"><h3>Avance Planificado</h3><h1 id="plan">0%</h1></div>
<div class="card real"><h3>Avance Real</h3><h1 id="real">0%</h1></div>
<div class="card desv"><h3>Desviación</h3><h1 id="desv">0%</h1></div>
</div>

<div class="filtro">
Frente:
<select id="filtroFrente" onchange="filtrar()">
<option value="Todos">Todos</option>
</select>
<button onclick="limpiarFiltro()">Limpiar</button>
</div>

<div id="grafico"></div>

<div style="margin:40px;background:white;padding:20px;border-radius:10px;">
<h3>Detalle por frente</h3>
<table id="tablaDetalle">
<thead>
<tr>
<th>Frente</th><th>Planificado</th><th>Real</th><th>Desviación</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>

// ✅ LISTA FLEXIBLE (detecta variaciones, errores, plurales)
const FRENTES_VALIDOS = [
"core","global","integr","card","payment",
"asist","digital","proceso",
"aplic","migr","data","conces","infra"
];

// ✅ capitalizar texto
function capitalizar(t){
return t.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());
}

// ✅ fecha
(function(){
let h=new Date();
document.getElementById("fechaHoy").innerText=
String(h.getDate()).padStart(2,'0')+"/"+
String(h.getMonth()+1).padStart(2,'0')+"/"+
String(h.getFullYear()).slice(-2);
})();

let frentesGlobal=[],planGlobal=[],realGlobal=[];

// ✅ normalizar nombres correctamente
function normalizar(n){

let t=n.toLowerCase();

if(t.includes("infra")) return "Infraestructura";
if(t.includes("aplic")) return "Aplicaciones Soporte";
if(t.includes("asist")) return "Canales Asistidos";
if(t.includes("digital")) return "Canales Digitales";
if(t.includes("integr")) return "Integraciones";
if(t.includes("migr")) return "Migración";

return capitalizar(n);
}

// ✅ cargar excel
document.getElementById('fileInput').addEventListener('change', e=>{
let reader=new FileReader();

reader.onload=e=>{
let wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
procesarExcel(wb);
};

reader.readAsArrayBuffer(e.target.files[0]);
});

// ✅ PROCESO FINAL CORRECTO
function procesarExcel(wb){

let frentes=[],plan=[],real=[];

wb.SheetNames.forEach(s=>{

let nombre=s.toLowerCase();

// ✅ FILTRO ROBUSTO
let valido=FRENTES_VALIDOS.some(f=>nombre.includes(f));
if(!valido) return;

let ws=wb.Sheets[s];

// ✅ LEER CELDAS
let p=leer(ws["N3"]);
let r=leer(ws["R3"]);

// ✅ SI VIENE VACIO → 0
if(p===null) p=0;
if(r===null) r=0;

frentes.push(normalizar(s));
plan.push(p);
real.push(r);

});

// ✅ GUARDAR
frentesGlobal=frentes;
planGlobal=plan;
realGlobal=real;

// ✅ ACTUALIZAR UI
llenarFiltro(frentes);
actualizar(frentes,plan,real);
llenarTabla(frentes,plan,real);
}

// ✅ limpieza valor
function leer(c){
if(!c) return null;
let v=c.v;

if(typeof v==="string") v=parseFloat(v.replace("%",""));
if(v<=1) v*=100;

return isNaN(v)?null:v;
}

// ✅ promedio
function promedio(a){
return a.reduce((x,y)=>x+y,0)/a.length;
}

// ✅ grafico
function actualizar(f,p,r){

let P=promedio(p);
let R=promedio(r);
let D=P-R;

document.getElementById("plan").innerText=P.toFixed(0)+"%";
document.getElementById("real").innerText=R.toFixed(0)+"%";
document.getElementById("desv").innerText=D.toFixed(0)+"%";

Plotly.newPlot("grafico",[
{x:f,y:p,type:'bar',name:'Planificado',
 text:p.map(v=>v.toFixed(0)+"%"),textposition:'outside',
 marker:{color:'red'}},

{x:f,y:r,type:'bar',name:'Real',
 text:r.map(v=>v.toFixed(0)+"%"),textposition:'outside',
 marker:{color:'pink'}}
],
{
title:"Avance Planificado y Real por Frente",
yaxis:{range:[0,100],ticksuffix:"%"}
});
}

// ✅ tabla
function llenarTabla(f,p,r){

let tb=document.querySelector("#tablaDetalle tbody");
tb.innerHTML="";

f.forEach((x,i)=>{

let d=p[i]-r[i];

let c=d>10?"red":d>5?"orange":"lightgreen";

tb.innerHTML+=`
<tr>
<td>${x}</td>
<td>${p[i].toFixed(0)}%</td>
<td>${r[i].toFixed(0)}%</td>
<td style="background:${c}">${d.toFixed(0)}%</td>
</tr>`;
});
}

// ✅ filtro
function llenarFiltro(f){
let s=document.getElementById("filtroFrente");
s.innerHTML='<option>Todos</option>';

f.forEach(x=>{
let o=document.createElement("option");
o.value=x;o.text=x;
s.appendChild(o);
});
}

function filtrar(){

let f=filtroFrente.value;

if(f==="Todos"){
actualizar(frentesGlobal,planGlobal,realGlobal);
llenarTabla(frentesGlobal,planGlobal,realGlobal);
return;
}

let i=frentesGlobal.indexOf(f);

actualizar([frentesGlobal[i]],[planGlobal[i]],[realGlobal[i]]);
llenarTabla([frentesGlobal[i]],[planGlobal[i]],[realGlobal[i]]);
}

function limpiarFiltro(){
filtroFrente.value="Todos";
actualizar(frentesGlobal,planGlobal,realGlobal);
llenarTabla(frentesGlobal,planGlobal,realGlobal);
}

</script>

</body>
</html>
