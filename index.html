<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tablero de Cascadas</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background:#f4f4f4;
}

header {
    background: red;
    color: white;
    padding: 15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h2{
    font-size:28px;
    font-weight:bold;
    text-transform:capitalize;
}

#fechaHoy{
    font-size:18px;
    font-weight:bold;
}

button {
    background: orange;
    padding: 10px;
    border: none;
    cursor: pointer;
}

h2.main-title{
    text-align:center;
    font-size:26px;
    font-weight:bold;
    text-transform:uppercase;
}

.kpis {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 20px;
}

.card {
    background: white;
    padding: 20px;
    width: 25%;
    text-align: center;
    border-radius: 10px;
}

.card h3{
    font-weight:bold;
    text-transform:capitalize;
}

.plan { border: 3px solid #4a6cff; }
.real { border: 3px solid gray; }
.desv { border: 3px solid red; }

.filtro {
    margin:20px;
    background:white;
    padding:15px;
    border-radius:10px;
    font-weight:bold;
}

table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    padding:8px;
    text-align:center;
}

th {
    background:#ddd;
}
</style>
</head>

<body>

<header>
    <h2>Tablero de Cascadas</h2>
    <div id="fechaHoy"></div>
    <button onclick="document.getElementById('fileInput').click()">📂 Cargar Excel</button>
    <input type="file" id="fileInput" style="display:none">
</header>

<h2 class="main-title">CUMPLIMIENTO DEL PROYECTO</h2>

<div class="kpis">
    <div class="card plan">
        <h3>Avance Planificado</h3>
        <h1 id="plan">0%</h1>
    </div>

    <div class="card real">
        <h3>Avance Real</h3>
        <h1 id="real">0%</h1>
    </div>

    <div class="card desv">
        <h3>Desviación</h3>
        <h1 id="desv">0%</h1>
    </div>
</div>

<div class="filtro">
    Frente:
    <select id="filtroFrente" onchange="filtrar()">
        <option value="Todos">Todos</option>
    </select>

    <button onclick="limpiarFiltro()" style="margin-left:20px; background:red; color:white;">
        Limpiar
    </button>
</div>

<div id="grafico" style="margin:40px;"></div>

<div style="margin:40px; background:white; padding:20px; border-radius:10px;">
    <h3>Detalle por frente</h3>

    <table id="tablaDetalle">
        <thead>
            <tr>
                <th>Frente</th>
                <th>Planificado</th>
                <th>Real</th>
                <th>Desviación</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>

// ===== FORMATO TEXTO =====
function capitalizar(texto){
    return texto.toLowerCase().replace(/(^\w|\s\w)/g, l => l.toUpperCase());
}

// ===== FECHA =====
function mostrarFecha(){
    let h = new Date();
    let d = String(h.getDate()).padStart(2,'0');
    let m = String(h.getMonth()+1).padStart(2,'0');
    let a = String(h.getFullYear()).slice(-2);
    document.getElementById("fechaHoy").innerText = `${d}/${m}/${a}`;
}
mostrarFecha();

// ===== VARIABLES =====
let frentesGlobal = [];
let planGlobal = [];
let realGlobal = [];

// ===== NORMALIZAR =====
function normalizarNombre(nombre){

    let n = nombre.toLowerCase();

    if(n.includes("infra")) return "Infraestructura";
    if(n.includes("aplica")) return "Aplicaciones soporte";

    return capitalizar(nombre);
}

// ===== CARGAR EXCEL =====
document.getElementById('fileInput').addEventListener('change', function(e){

    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(e){
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type:'array'});
        procesarExcel(workbook);
    };

    reader.readAsArrayBuffer(file);
});

// ===== PROCESAR =====
function procesarExcel(workbook){

    let frentes = [];
    let plan = [];
    let real = [];

    workbook.SheetNames.forEach(sheet => {

        let ws = workbook.Sheets[sheet];

        let p = leerValor(ws["N3"]);
        let r = leerValor(ws["R3"]);

        // ✅ SIEMPRE AGREGAR (aunque sea 0)
        if(p === null) p = 0;
        if(r === null) r = 0;

        frentes.push(normalizarNombre(sheet));
        plan.push(p);
        real.push(r);

    });

    frentesGlobal = frentes;
    planGlobal = plan;
    realGlobal = real;

    llenarFiltro(frentes);
    actualizar(frentes, plan, real);
    llenarTabla(frentes, plan, real);
}

// ===== LIMPIAR =====
function leerValor(celda){
    if(!celda) return null;
    let v = celda.v;

    if(typeof v === "string"){
        v = parseFloat(v.replace("%",""));
    }

    if(v <= 1) v *= 100;

    return isNaN(v) ? null : v;
}

// ===== PROMEDIO =====
function promedio(arr){
    return arr.reduce((a,b)=>a+b,0)/arr.length;
}

// ===== GRAFICO =====
function actualizar(frentes, plan, real){

    let p = promedio(plan);
    let r = promedio(real);
    let d = p - r;

    document.getElementById("plan").innerText = p.toFixed(0)+"%";
    document.getElementById("real").innerText = r.toFixed(0)+"%";
    document.getElementById("desv").innerText = d.toFixed(0)+"%";

    Plotly.newPlot("grafico", [
        {
            x: frentes,
            y: plan,
            name:'Planificado',
            type:'bar',
            text: plan.map(v=>v.toFixed(0)+"%"),
            textposition:'outside',
            marker:{color:'red'}
        },
        {
            x: frentes,
            y: real,
            name:'Real',
            type:'bar',
            text: real.map(v=>v.toFixed(0)+"%"),
            textposition:'outside',
            marker:{color:'pink'}
        }
    ],
    {
        title:"Avance Planificado y Real por Frente",
        yaxis:{range:[0,100],ticksuffix:"%"},
        barmode:'group'
    });
}

// ===== TABLA =====
function llenarTabla(frentes, plan, real){

    let tbody = document.querySelector("#tablaDetalle tbody");
    tbody.innerHTML = "";

    frentes.forEach((f,i)=>{

        let d = plan[i] - real[i];

        let color = "lightgreen";
        if(d > 10) color="red";
        else if(d > 5) color="orange";

        tbody.innerHTML += `
        <tr>
            <td>${f}</td>
            <td>${plan[i].toFixed(0)}%</td>
            <td>${real[i].toFixed(0)}%</td>
            <td style="background:${color};">${d.toFixed(0)}%</td>
        </tr>`;
    });
}

// ===== FILTRO =====
function llenarFiltro(frentes){
    let s = document.getElementById("filtroFrente");
    s.innerHTML = '<option value="Todos">Todos</option>';

    frentes.forEach(f=>{
        let o = document.createElement("option");
        o.value=f;
        o.text=f;
        s.appendChild(o);
    });
}

function filtrar(){
    let f = document.getElementById("filtroFrente").value;

    if(f==="Todos"){
        actualizar(frentesGlobal, planGlobal, realGlobal);
        llenarTabla(frentesGlobal, planGlobal, realGlobal);
        return;
    }

    let i = frentesGlobal.indexOf(f);

    actualizar([frentesGlobal[i]], [planGlobal[i]], [realGlobal[i]]);
    llenarTabla([frentesGlobal[i]], [planGlobal[i]], [realGlobal[i]]);
}

function limpiarFiltro(){
    document.getElementById("filtroFrente").value="Todos";
    actualizar(frentesGlobal, planGlobal, realGlobal);
    llenarTabla(frentesGlobal, planGlobal, realGlobal);
}

</script>

</body>
</html>
``
