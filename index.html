<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Proyecto</title>

<!-- LIBRERÍAS -->
https://cdn.plot.ly/plotly-latest.min.js"></script>
://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
    body {
        font-family: Arial;
        margin: 0;
        background:#f4f4f4;
    }

    header {
        background: red;
        color: white;
        padding: 15px;
    }

    .kpis {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-top: 20px;
    }

    .card {
        background: white;
        padding: 20px;
        width: 25%;
        text-align: center;
        border-radius: 10px;
        box-shadow: 0px 2px 6px rgba(0,0,0,0.2);
    }

    .plan { border: 3px solid blue; }
    .real { border: 3px solid gray; }
    .desv { border: 3px solid red; }

    #grafico {
        margin: 40px;
    }
</style>

</head>

<body>

<header>
    <h2>Tablero de Dependencias – Proyecto Helios</h2>
    <button onclick="document.getElementById('fileInput').click()"
        style="padding:10px; background:orange; border:none; cursor:pointer;">
        📂 Cargar Excel
    </button>
    <input type="file" id="fileInput" style="display:none">
</header>

<div style="text-align:center; margin-top:30px;">
    <h1>Cargar Excel</h1>
</div>

<!-- KPIs -->
<div class="kpis">
    <div class="card plan">
        <h3>Avance Planificado</h3>
        <h1 id="plan">0%</h1>
    </div>

    <div class="card real">
        <h3>Avance Real</h3>
        <h1 id="real">0%</h1>
    </div>

    <div class="card desv">
        <h3>Desviación</h3>
        <h1 id="desv">0%</h1>
    </div>
</div>

<!-- GRAFICO -->
<div id="grafico"></div>

<script>

// =====================
// EVENTO CARGA ARCHIVO
// =====================
document.getElementById('fileInput').addEventListener('change', handleFile);

function handleFile(e){
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(e){
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type: 'array'});

        procesarExcel(workbook);
    };

    reader.readAsArrayBuffer(file);
}

// =====================
// PROCESAR EXCEL
// =====================
function procesarExcel(workbook){

    let frentes = [];
    let plan = [];
    let real = [];

    workbook.SheetNames.forEach(sheetName => {

        const sheet = workbook.Sheets[sheetName];
        
        // Empieza en fila 5 como tu Excel
        const json = XLSX.utils.sheet_to_json(sheet, {range:4});

        let sumaPlan = 0;
        let sumaReal = 0;
        let count = 0;

        json.forEach(row => {

            Object.keys(row).forEach(key => {
                
                let valor = row[key];

                // PLAN
                if(key.toLowerCase().includes("avance") && 
                   !key.toLowerCase().includes("real")){
                    
                    sumaPlan += limpiar(valor);
                }

                // REAL
                if(key.toLowerCase().includes("real")){
                    sumaReal += limpiar(valor);
                }

            });

            count++;
        });

        if(count > 0){
            frentes.push(sheetName);
            plan.push(sumaPlan / count);
            real.push(sumaReal / count);
        }
    });

    actualizarDashboard(frentes, plan, real);
}

// =====================
// LIMPIAR %
/* Convierte:
"100%" -> 100
*/
function limpiar(valor){
    if(typeof valor === "string"){
        valor = valor.replace("%","");
    }
    return parseFloat(valor) || 0;
}

// =====================
// ACTUALIZAR UI
// =====================
function actualizarDashboard(frentes, plan, real){

    let totalPlan = promedio(plan);
    let totalReal = promedio(real);
    let desv = totalPlan - totalReal;

    document.getElementById("plan").innerText = totalPlan.toFixed(0) + "%";
    document.getElementById("real").innerText = totalReal.toFixed(0) + "%";
    document.getElementById("desv").innerText = desv.toFixed(0) + "%";

    var data = [
        {
            x: frentes,
            y: plan,
            name:"Planificado",
            type:"bar",
            marker:{color:"red"}
        },
        {
            x: frentes,
            y: real,
            name:"Real",
            type:"bar",
            marker:{color:"pink"}
        }
    ];

    Plotly.newPlot("grafico", data);
}

// =====================
function promedio(arr){
    return arr.reduce((a,b)=>a+b,0)/arr.length;
}

</script>

</body>
</html>
