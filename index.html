<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Proyecto</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f4f4;
}

header {
    background: red;
    color: white;
    padding: 20px;
    display: flex;
    justify-content: space-between;
}

button {
    padding: 10px 20px;
    background: orange;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

.kpis {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-top: 30px;
}

.card {
    background: white;
    padding: 20px;
    width: 200px;
    text-align: center;
    border-radius: 10px;
}

.plan { border: 2px solid blue; }
.real { border: 2px solid gray; }
.desv { border: 2px solid red; }

#grafico {
    margin: 40px;
}
</style>
</head>

<body>

<header>
    <h2>Tablero Proyecto Helios</h2>

    <button onclick="document.getElementById('fileInput').click()">
        📂 Cargar Excel
    </button>

    <input type="file" id="fileInput" style="display:none" />
</header>

<div style="text-align:center; margin-top:40px;">
    <h1>Carga tu archivo Excel</h1>
</div>

<div class="kpis">
    <div class="card plan">
        <h3>Planificado</h3>
        <h2 id="plan">0%</h2>
    </div>

    <div class="card real">
        <h3>Real</h3>
        <h2 id="real">0%</h2>
    </div>

    <div class="card desv">
        <h3>Desviación</h3>
        <h2 id="desv">0%</h2>
    </div>
</div>

<div id="grafico"></div>

<script>

document.getElementById('fileInput').addEventListener('change', handleFile);

function handleFile(e){
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(e){
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type:'array'});
        procesarExcel(workbook);
    };

    reader.readAsArrayBuffer(file);
}

function procesarExcel(workbook){

    let frentes = [];
    let plan = [];
    let real = [];

    workbook.SheetNames.forEach(sheetName => {

        const sheet = workbook.Sheets[sheetName];
        const json = XLSX.utils.sheet_to_json(sheet, {range: 4});

        let sumaPlan = 0;
        let sumaReal = 0;
        let count = 0;

        json.forEach(row => {

            for(let key in row){

                if(key.toLowerCase().includes("avance") && !key.toLowerCase().includes("real")){
                    sumaPlan += limpiar(row[key]);
                }

                if(key.toLowerCase().includes("real")){
                    sumaReal += limpiar(row[key]);
                }
            }

            count++;
        });

        if(count > 0){
            frentes.push(sheetName);
            plan.push(sumaPlan / count);
            real.push(sumaReal / count);
        }

    });

    actualizar(frentes, plan, real);
}

function limpiar(valor){
    if(typeof valor === "string"){
        valor = valor.replace("%","");
    }
    return parseFloat(valor) || 0;
}

function actualizar(frentes, plan, real){

    let p = promedio(plan);
    let r = promedio(real);
    let d = p - r;

    document.getElementById("plan").innerText = p.toFixed(0) + "%";
    document.getElementById("real").innerText = r.toFixed(0) + "%";
    document.getElementById("desv").innerText = d.toFixed(0) + "%";

    let data = [
        {x: frentes, y: plan, name:"Planificado", type:"bar", marker:{color:"red"}},
        {x: frentes, y: real, name:"Real", type:"bar", marker:{color:"pink"}}
    ];

    Plotly.newPlot("grafico", data);
}

function promedio(arr){
    return arr.reduce((a,b)=>a+b,0)/arr.length;
}

</script>

</body>
</html>
