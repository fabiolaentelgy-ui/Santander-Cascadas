<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Proyecto</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

/* HEADER */
header {
    background: red;
    color: white;
    padding: 20px;
    display: flex;
    justify-content: space-between;
}

/* BOTÓN */
button {
    padding: 12px 20px;
    background: orange;
    border: none;
    cursor: pointer;
    border-radius: 5px;
    font-size: 16px;
}

/* KPIs */
.kpis {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin: 30px;
}

.card {
    background: white;
    padding: 20px;
    width: 250px;
    text-align: center;
    border-radius: 10px;
}

.plan { border: 2px solid blue; }
.real { border: 2px solid gray; }
.desv { border: 2px solid red; }

#grafico {
    margin: 40px;
}
</style>
</head>

<body>

<header>
    <h2>🚀 Tablero Proyecto Helios</h2>

    <button onclick="document.getElementById('fileInput').click()">
        📂 Cargar Excel
    </button>

    <input type="file" id="fileInput" style="display:none" />
</header>

<h1 style="text-align:center;">Cumplimiento del Proyecto</h1>

<div class="kpis">

    <div class="card plan">
        <h3>Avance Planificado</h3>
        <h2 id="plan">0%</h2>
    </div>

    <div class="card real">
        <h3>Avance Real</h3>
        <h2 id="real">0%</h2>
    </div>

    <div class="card desv">
        <h3>Desviación</h3>
        <h2 id="desv">0%</h2>
    </div>

</div>

<div id="grafico"></div>

<script>

document.getElementById('fileInput').addEventListener('change', handleFile);

function handleFile(e){
    const file = e.target.files[0];

    if(!file){
        alert("Selecciona un archivo");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type:'array'});
        procesarExcel(workbook);
    };

    reader.readAsArrayBuffer(file);
}

function procesarExcel(workbook){

    let frentes = [];
    let plan = [];
    let real = [];

    workbook.SheetNames.forEach(sheetName => {

        const sheet = workbook.Sheets[sheetName];

        // ✅ Saltar las primeras 4 filas (tu estructura real)
        const json = XLSX.utils.sheet_to_json(sheet, {range: 4});

        let sumaPlan = 0;
        let sumaReal = 0;
        let count = 0;

        json.forEach(row => {

            let planVal = null;
            let realVal = null;

            for(let key in row){

                let col = key.toLowerCase();

                // ✅ Busca columna PLAN (base)
                if(col.includes("base")){
                    planVal = limpiar(row[key]);
                }

                // ✅ Busca columna REAL
                if(col.includes("real")){
                    realVal = limpiar(row[key]);
                }
            }

            // ✅ Solo sumar si ambos existen
            if(planVal !== null && realVal !== null){
                sumaPlan += planVal;
                sumaReal += realVal;
                count++;
            }

        });

        if(count > 0){
            frentes.push(sheetName);
            plan.push(sumaPlan / count);
            real.push(sumaReal / count);
        }

    });

    actualizar(frentes, plan, real);
}

function limpiar(valor){
    if(typeof valor === "string"){
        valor = valor.replace("%","").trim();
    }

    let num = parseFloat(valor);
    return isNaN(num) ? 0 : num;
}

function actualizar(frentes, plan, real){

    let p = promedio(plan);
    let r = promedio(real);
    let d = p - r;

    document.getElementById("plan").innerText = p.toFixed(0) + "%";
    document.getElementById("real").innerText = r.toFixed(0) + "%";
    document.getElementById("desv").innerText = d.toFixed(0) + "%";

    let data = [
        {x: frentes, y: plan, name:"Planificado", type:"bar", marker:{color:"red"}},
        {x: frentes, y: real, name:"Real", type:"bar", marker:{color:"pink"}}
    ];

    Plotly.newPlot("grafico", data);
}

function promedio(arr){
    if(arr.length === 0) return 0;
    return arr.reduce((a,b)=>a+b,0)/arr.length;
}

</script>

</body>
</html>
