<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tablero Proyecto Helios</title>

<!-- ✅ LIBRERÍAS CORRECTAS -->
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background:#f4f4f4;
}

header {
    background: red;
    color: white;
    padding: 20px;
}

/* BOTÓN */
button {
    background: orange;
    padding: 10px;
    border: none;
    cursor: pointer;
}

/* KPIs */
.kpis {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 20px;
}

.card {
    background: white;
    padding: 20px;
    width: 25%;
    text-align: center;
    border-radius: 10px;
    box-shadow: 0px 2px 6px rgba(0,0,0,0.2);
}

.plan { border: 3px solid blue; }
.real { border: 3px solid gray; }
.desv { border: 3px solid red; }

/* GRAFICO */
#grafico {
    margin: 40px;
}
</style>

</head>

<body>

<header>
    <h2>Tablero de Dependencias – Proyecto Helios</h2>
    <button onclick="document.getElementById('fileInput').click()">📂 Cargar Excel</button>
    <input type="file" id="fileInput" style="display:none">
</header>

<h2 style="text-align:center;">Cumplimiento del Proyecto</h2>

<!-- KPIs -->
<div class="kpis">

    <div class="card plan">
        <h3>Avance Planificado</h3>
        <h1 id="plan">0%</h1>
    </div>

    <div class="card real">
        <h3>Avance Real</h3>
        <h1 id="real">0%</h1>
    </div>

    <div class="card desv">
        <h3>Desviación</h3>
        <h1 id="desv">0%</h1>
    </div>

</div>

<!-- GRAFICO -->
<div id="grafico"></div>

<script>

// =====================
// CARGAR EXCEL
// =====================
document.getElementById('fileInput').addEventListener('change', function(e){

    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(e){
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type:'array'});

        procesarExcel(workbook);
    };

    reader.readAsArrayBuffer(file);
});


// =====================
// PROCESAR EXCEL
// =====================
function procesarExcel(workbook){

    let frentes = [];
    let plan = [];
    let real = [];

    workbook.SheetNames.forEach(sheet => {

        let ws = workbook.Sheets[sheet];

        // ✅ LEER CELDAS EXACTAS
        let planCell = ws["N3"];
        let realCell = ws["R3"];

        let planVal = leerValor(planCell);
        let realVal = leerValor(realCell);

        if(planVal !== null && realVal !== null){
            frentes.push(sheet);
            plan.push(planVal);
            real.push(realVal);
        }

    });

    actualizar(frentes, plan, real);
}


// =====================
// LIMPIAR VALORES
// =====================
function leerValor(celda){

    if(!celda) return null;

    let valor = celda.v;

    if(typeof valor === "string"){
        valor = valor.replace("%","");
        valor = parseFloat(valor);
    }

    // ✅ SI ES DECIMAL (0.48 → 48)
    if(valor <= 1){
        valor = valor * 100;
    }

    return isNaN(valor) ? null : valor;
}


// =====================
// PROMEDIO
// =====================
function promedio(arr){

    let validos = arr.filter(v => v !== null);

    if(validos.length === 0) return 0;

    return validos.reduce((a,b)=>a+b,0) / validos.length;
}


// =====================
// ACTUALIZAR DASHBOARD
// =====================
function actualizar(frentes, plan, real){

    let totalPlan = promedio(plan);
    let totalReal = promedio(real);
    let desviacion = totalPlan - totalReal;

    document.getElementById("plan").innerText = totalPlan.toFixed(0) + "%";
    document.getElementById("real").innerText = totalReal.toFixed(0) + "%";
    document.getElementById("desv").innerText = desviacion.toFixed(0) + "%";

    let data = [
        {
            x: frentes,
            y: plan,
            name: "Planificado",
            type: "bar",
            marker: {color: "red"},
            text: plan.map(v => v.toFixed(0) + "%"),
            textposition: "outside"
        },
        {
            x: frentes,
            y: real,
            name: "Real",
            type: "bar",
            marker: {color: "pink"},
            text: real.map(v => v.toFixed(0) + "%"),
            textposition: "outside"
        }
    ];

    Plotly.newPlot("grafico", data, {
        yaxis: { range:[0,100], ticksuffix:"%" },
        barmode:"group"
    });
}

</script>

</body>
</html>
