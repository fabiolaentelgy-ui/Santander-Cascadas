<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tablero Proyecto Helios</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

/* HEADER */
header {
    background: #e10600;
    color: white;
    padding: 20px;
    display: flex;
    justify-content: space-between;
}

/* BOTÓN */
button {
    background: orange;
    padding: 12px 20px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    font-size: 16px;
}

/* KPIs */
.kpis {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 30px;
}

.card {
    background: white;
    padding: 20px;
    width: 250px;
    text-align: center;
    border-radius: 10px;
}

.plan { border: 3px solid #4a6cff; }
.real { border: 3px solid gray; }
.desv { border: 3px solid red; }

/* GRAFICO */
#grafico {
    margin: 40px;
}
</style>
</head>

<body>

<header>
    <h2>Tablero de Dependencias – Proyecto Helios</h2>

    <button onclick="document.getElementById('fileInput').click()">
        📂 Cargar Excel
    </button>

    <input type="file" id="fileInput" style="display:none" />
</header>

<h1 style="text-align:center">Cumplimiento del Proyecto</h1>

<div class="kpis">
    <div class="card plan">
        <h3>Avance Planificado</h3>
        <h2 id="plan">0%</h2>
    </div>

    <div class="card real">
        <h3>Avance Real</h3>
        <h2 id="real">0%</h2>
    </div>

    <div class="card desv">
        <h3>Desviación</h3>
        <h2 id="desv">0%</h2>
    </div>
</div>

<div id="grafico"></div>

<script>

// CARGA ARCHIVO
document.getElementById('fileInput').addEventListener('change', function(e){

    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = function(e){

        let data = new Uint8Array(e.target.result);
        let workbook = XLSX.read(data, {type:'array'});

        procesarExcel(workbook);
    };

    reader.readAsArrayBuffer(file);
});


// PROCESAR EXCEL
function procesarExcel(workbook){

    let frentes = [];
    let plan = [];
    let real = [];

    workbook.SheetNames.forEach(sheet => {

        let ws = workbook.Sheets[sheet];

        // ✅ Leer N3 y R3 directamente
        let planCell = ws["N3"];
        let realCell = ws["R3"];

        let planVal = leerValor(planCell);
        let realVal = leerValor(realCell);

        if(planVal !== null && realVal !== null){

            frentes.push(sheet);
            plan.push(planVal);
            real.push(realVal);
        }
    });

    actualizar(frentes, plan, real);
}


// LIMPIAR VALOR
function leerValor(celda){

    if(!celda) return null;

    let valor = celda.v;

    if(typeof valor === "string"){
        valor = valor.replace("%","");
    }

    valor = parseFloat(valor);

    if(isNaN(valor)) return null;

    return valor;
}


// ACTUALIZAR DASHBOARD
function actualizar(frentes, plan, real){

    let totalPlan = promedio(plan);
    let totalReal = promedio(real);
    let desv = totalPlan - totalReal;

    document.getElementById("plan").innerText = totalPlan.toFixed(0) + "%";
    document.getElementById("real").innerText = totalReal.toFixed(0) + "%";
    document.getElementById("desv").innerText = desv.toFixed(0) + "%";

    let data = [
        {
            x: frentes,
            y: plan,
            name: "Planificado",
            type: "bar",
            marker: {color: "red"}
        },
        {
            x: frentes,
            y: real,
            name: "Real",
            type: "bar",
            marker: {color: "pink"}
        }
    ];

    Plotly.newPlot("grafico", data);
}


// PROMEDIO
function promedio(arr){
    return arr.reduce((a,b)=>a+b,0) / arr.length;
}

</script>

</body>
</html>
