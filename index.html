<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tablero de Cascadas</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background:#f4f4f4;
}

header {
    background: red;
    color: white;
    padding: 15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button {
    background: orange;
    padding: 8px;
    border: none;
    cursor: pointer;
}

/* KPIs */
.kpis {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 20px;
}

.card {
    background: white;
    padding: 20px;
    width: 25%;
    text-align: center;
    border-radius: 10px;
    box-shadow: 0px 2px 6px rgba(0,0,0,0.2);
}

.plan { border: 3px solid #4a6cff; }
.real { border: 3px solid gray; }
.desv { border: 3px solid red; }

/* FILTRO */
.filtro {
    margin:20px; 
    background:white; 
    padding:15px; 
    border-radius:10px;
}

/* TABLA */
table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    padding:8px;
    text-align:center;
}

th {
    background:#ddd;
}
</style>

</head>

<body>

<header>
    <h2>Tablero de Cascadas</h2>

    <div id="fechaHoy"></div>

    <button onclick="document.getElementById('fileInput').click()">📂 Cargar Excel</button>
    <input type="file" id="fileInput" style="display:none">
</header>

<h2 style="text-align:center;">Cumplimiento del Proyecto</h2>

<!-- KPIs -->
<div class="kpis">
    <div class="card plan">
        <h3>Avance Planificado</h3>
        <h1 id="plan">0%</h1>
    </div>

    <div class="card real">
        <h3>Avance Real</h3>
        <h1 id="real">0%</h1>
    </div>

    <div class="card desv">
        <h3>Desviación</h3>
        <h1 id="desv">0%</h1>
    </div>
</div>

<!-- FILTRO -->
<div class="filtro">
    <label><b>Frente:</b></label>

    <select id="filtroFrente" onchange="filtrar()">
        <option value="Todos">Todos</option>
    </select>

    <button onclick="limpiarFiltro()" style="margin-left:20px; background:#ff4d4d; color:white;">
        ✖ Limpiar
    </button>
</div>

<!-- GRAFICO -->
<div id="grafico" style="margin:40px;"></div>

<!-- TABLA -->
<div style="margin:40px; background:white; padding:20px; border-radius:10px;">
    <h3>Detalle por Frente</h3>

    <table id="tablaDetalle">
        <thead>
            <tr>
                <th>Frente</th>
                <th>Planificado</th>
                <th>Real</th>
                <th>Desviación</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>

// ===== FECHA =====
function mostrarFecha(){
    let hoy = new Date();
    let d = String(hoy.getDate()).padStart(2,'0');
    let m = String(hoy.getMonth()+1).padStart(2,'0');
    let a = String(hoy.getFullYear()).slice(-2);
    document.getElementById("fechaHoy").innerText = `${d}/${m}/${a}`;
}
mostrarFecha();

// ===== VARIABLES =====
let frentesGlobal = [];
let planGlobal = [];
let realGlobal = [];

// ===== CARGAR EXCEL =====
document.getElementById('fileInput').addEventListener('change', function(e){

    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(e){
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type:'array'});
        procesarExcel(workbook);
    };

    reader.readAsArrayBuffer(file);
});

// ===== PROCESAR =====
function procesarExcel(workbook){

    let frentes = [];
    let plan = [];
    let real = [];

    workbook.SheetNames.forEach(sheet => {

        let ws = workbook.Sheets[sheet];

        let planVal = leerValor(ws["N3"]);
        let realVal = leerValor(ws["R3"]);

        if(planVal !== null && realVal !== null){
            frentes.push(sheet);
            plan.push(planVal);
            real.push(realVal);
        }

    });

    frentesGlobal = frentes;
    planGlobal = plan;
    realGlobal = real;

    llenarFiltro(frentes);

    actualizar(frentes, plan, real);
    llenarTabla(frentes, plan, real);
}

// ===== LIMPIAR VALORES =====
function leerValor(celda){
    if(!celda) return null;

    let valor = celda.v;

    if(typeof valor === "string"){
        valor = valor.replace("%","");
        valor = parseFloat(valor);
    }

    if(valor <= 1) valor *= 100;

    return isNaN(valor) ? null : valor;
}

// ===== PROMEDIO =====
function promedio(arr){
    let v = arr.filter(x=>x!==null);
    if(v.length==0) return 0;
    return v.reduce((a,b)=>a+b,0)/v.length;
}

// ===== GRAFICO =====
function actualizar(frentes, plan, real){

    let p = promedio(plan);
    let r = promedio(real);
    let d = p - r;

    document.getElementById("plan").innerText = p.toFixed(0) + "%";
    document.getElementById("real").innerText = r.toFixed(0) + "%";
    document.getElementById("desv").innerText = d.toFixed(0) + "%";

    let data = [
        {
            x: frentes,
            y: plan,
            name: "Planificado",
            type: "bar",
            marker: {color:"red"},
            text: plan.map(v=>v.toFixed(0)+"%"),
            textposition:"outside"
        },
        {
            x: frentes,
            y: real,
            name: "Real",
            type: "bar",
            marker: {color:"pink"},
            text: real.map(v=>v.toFixed(0)+"%"),
            textposition:"outside"
        }
    ];

    Plotly.newPlot("grafico", data, {
        title: "Avance Planificado y Avance Real por Frente",
        yaxis:{range:[0,100],ticksuffix:"%"},
        barmode:"group"
    });
}

// ===== TABLA =====
function llenarTabla(frentes, plan, real){

    let tbody = document.querySelector("#tablaDetalle tbody");
    tbody.innerHTML = "";

    frentes.forEach((f,i)=>{

        let p = plan[i];
        let r = real[i];
        let d = p - r;

        let color = "lightgreen";
        if(d > 10) color="red";
        else if(d > 5) color="orange";

        let fila = `
        <tr>
            <td>${f}</td>
            <td>${p.toFixed(0)}%</td>
            <td>${r.toFixed(0)}%</td>
            <td style="background:${color};">${d.toFixed(0)}%</td>
        </tr>`;

        tbody.innerHTML += fila;
    });
}

// ===== FILTRO =====
function llenarFiltro(frentes){
    let select = document.getElementById("filtroFrente");
    select.innerHTML = '<option value="Todos">Todos</option>';

    frentes.forEach(f=>{
        let o = document.createElement("option");
        o.value=f;
        o.text=f;
        select.appendChild(o);
    });
}

function filtrar(){

    let s = document.getElementById("filtroFrente").value;

    if(s === "Todos"){
        actualizar(frentesGlobal, planGlobal, realGlobal);
        llenarTabla(frentesGlobal, planGlobal, realGlobal);
        return;
    }

    let i = frentesGlobal.indexOf(s);

    actualizar([frentesGlobal[i]], [planGlobal[i]], [realGlobal[i]]);
    llenarTabla([frentesGlobal[i]], [planGlobal[i]], [realGlobal[i]]);
}

function limpiarFiltro(){
    document.getElementById("filtroFrente").value = "Todos";
    actualizar(frentesGlobal, planGlobal, realGlobal);
    llenarTabla(frentesGlobal, planGlobal, realGlobal);
}

</script>

</body>
</html>
